name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run 2>&1 | tee build.log

      - name: Build LittleFS image
        run: |
          pio run --target buildfs 2>&1 | tee -a build.log
          ls -la .pio/build/nodemcu-32s/littlefs.bin || echo "LittleFS image not found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/nodemcu-32s/firmware.bin

      - name: Upload LittleFS artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: littlefs
          path: .pio/build/nodemcu-32s/littlefs.bin
